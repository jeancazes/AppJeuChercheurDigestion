<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enseignant - SVT Digestion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5F9FC 0%, #EBF4F9 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(90, 154, 184, 0.1);
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: #5A9AB8;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .icon-medical {
            width: 40px;
            height: 40px;
        }

        .subtitle {
            color: #6B8A9A;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(90, 154, 184, 0.1);
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .section h2 {
            color: #5A9AB8;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #5A9AB8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E3EEF3;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #5A9AB8;
            box-shadow: 0 0 0 3px rgba(90, 154, 184, 0.1);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .team-card {
            background: linear-gradient(135deg, #F8FCFE 0%, #F2F8FB 100%);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #A8D8EA;
            transition: all 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(90, 154, 184, 0.15);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .team-name {
            font-size: 20px;
            font-weight: bold;
            color: #5A9AB8;
        }

        .team-level {
            background: linear-gradient(135deg, #B8E6D5 0%, #9AD4C2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .team-members {
            margin-bottom: 15px;
        }

        .member-tag {
            display: inline-block;
            background: white;
            padding: 5px 10px;
            border-radius: 8px;
            margin: 3px;
            font-size: 13px;
            color: #6B8A9A;
        }

        .team-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #6B8A9A;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #5A9AB8;
        }

        .points-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .point-group {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .point-group label {
            font-size: 12px;
            color: #6B8A9A;
            display: block;
            margin-bottom: 5px;
        }

        .point-input {
            display: flex;
            gap: 5px;
        }

        .btn-point {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-minus {
            background: linear-gradient(135deg, #F5C6D6 0%, #E89BB0 100%);
            color: white;
        }

        .btn-plus {
            background: linear-gradient(135deg, #B8E6D5 0%, #9AD4C2 100%);
            color: white;
        }

        .btn-minus:hover, .btn-plus:hover {
            transform: scale(1.05);
        }

        .btn-add-team {
            background: linear-gradient(135deg, #A8D8EA 0%, #7FB5D1 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-add-team:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 154, 184, 0.3);
        }

        @media (max-width: 768px) {
            .teams-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <svg class="icon-medical" viewBox="0 0 24 24" fill="none">
                    <path d="M9 2L9 9L2 9L2 15L9 15L9 22L15 22L15 15L22 15L22 9L15 9L15 2L9 2Z" fill="#5A9AB8"/>
                </svg>
                Interface Enseignant
            </h1>
            <p class="subtitle">Gestion des classes et attribution des points</p>
        </div>

        <div class="section">
            <h2>Sélection de la classe</h2>
            <div class="form-group">
                <label>Année scolaire</label>
                <select id="yearSelect" onchange="loadClass()">
                    <option value="2024-2025">2024-2025</option>
                    <option value="2025-2026">2025-2026</option>
                </select>
            </div>
            <div class="form-group">
                <label>Classe</label>
                <select id="classSelect" onchange="loadClass()">
                    <option value="">Sélectionner une classe</option>
                    <option value="5A">5ème A</option>
                    <option value="5B">5ème B</option>
                    <option value="4A">4ème A</option>
                    <option value="4B">4ème B</option>
                </select>
            </div>
        </div>

        <div class="section" id="teamsSection" style="display: none;">
            <h2>Équipes de la classe</h2>
            <div class="teams-grid" id="teamsGrid"></div>
            <button class="btn-add-team" onclick="addTeam()">+ Ajouter une équipe</button>
        </div>
    </div>

    <script>
        let currentClass = null;
        let teams = [];

        function loadClass() {
            const year = document.getElementById('yearSelect').value;
            const classId = document.getElementById('classSelect').value;
            
            if (!classId) {
                document.getElementById('teamsSection').style.display = 'none';
                return;
            }

            currentClass = `${year}_${classId}`;
            const stored = localStorage.getItem(`teams_${currentClass}`);
            
            if (stored) {
                teams = JSON.parse(stored);
            } else {
                teams = [
                    {
                        id: 1,
                        name: 'Équipe 1',
                        members: ['Alice D.', 'Bob M.', 'Charlie R.'],
                        level: 1,
                        budget: 100,
                        discovery: 2,
                        reasoning: 1
                    },
                    {
                        id: 2,
                        name: 'Équipe 2',
                        members: ['David L.', 'Emma S.'],
                        level: 1,
                        budget: 100,
                        discovery: 1,
                        reasoning: 2
                    }
                ];
            }

            renderTeams();
            document.getElementById('teamsSection').style.display = 'block';
        }

        function renderTeams() {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = teams.map(team => `
                <div class="team-card">
                    <div class="team-header">
                        <div class="team-name">${team.name}</div>
                        <div class="team-level">LEVEL ${team.level}</div>
                    </div>
                    <div class="team-members">
                        ${team.members.map(m => `<span class="member-tag">${m}</span>`).join('')}
                    </div>
                    <div class="team-stats">
                        <div class="stat-box">
                            <div class="stat-label">Budget</div>
                            <div class="stat-value">${team.budget} €</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Réputation</div>
                            <div class="stat-value">${team.discovery + team.reasoning}</div>
                        </div>
                    </div>
                    <div class="points-controls">
                        <div class="point-group">
                            <label>Découverte</label>
                            <div class="point-input">
                                <button class="btn-point btn-minus" onclick="changePoints(${team.id}, 'discovery', -1)">-</button>
                                <div style="flex: 1; text-align: center; font-weight: bold; color: #5A9AB8; padding: 8px;">${team.discovery}</div>
                                <button class="btn-point btn-plus" onclick="changePoints(${team.id}, 'discovery', 1)">+</button>
                            </div>
                        </div>
                        <div class="point-group">
                            <label>Raisonnement</label>
                            <div class="point-input">
                                <button class="btn-point btn-minus" onclick="changePoints(${team.id}, 'reasoning', -1)">-</button>
                                <div style="flex: 1; text-align: center; font-weight: bold; color: #5A9AB8; padding: 8px;">${team.reasoning}</div>
                                <button class="btn-point btn-plus" onclick="changePoints(${team.id}, 'reasoning', 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function changePoints(teamId, type, delta) {
            const team = teams.find(t => t.id === teamId);
            if (!team) return;

            team[type] = Math.max(0, team[type] + delta);
            
            const totalPoints = team.discovery + team.reasoning;
            const oldLevel = team.level;
            team.level = Math.floor(totalPoints / 5) + 1;
            team.level = Math.min(4, team.level);

            if (team.level > oldLevel) {
                const budgetIncrements = [0, 100, 100, 300, 500];
                team.budget += budgetIncrements[team.level];
            }

            saveTeams();
            renderTeams();
        }

        function saveTeams() {
            localStorage.setItem(`teams_${currentClass}`, JSON.stringify(teams));
        }

        function addTeam() {
            const newId = Math.max(...teams.map(t => t.id), 0) + 1;
            teams.push({
                id: newId,
                name: `Équipe ${newId}`,
                members: ['Nouveau membre'],
                level: 1,
                budget: 100,
                discovery: 0,
                reasoning: 0
            });
            saveTeams();
            renderTeams();
        }
    </script>
</body>
</html>
